<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Q&A - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="notifications.html">🔔 <span>Alerts</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>Product Questions & Answers</h1>
    <p>Ask questions about products and get answers from the community.</p>
  </div>

  <div class="container" style="max-width:720px">
    <div class="card" style="margin-bottom:20px">
      <h3 style="margin-bottom:12px">Ask a Question</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Product</label>
          <select id="qaProduct"></select>
        </div>
      </div>
      <div class="form-group">
        <label>Your Question</label>
        <textarea id="qaQuestion" placeholder="Type your question about this product..." rows="3"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitQuestion()">Submit Question</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:16px">Recent Questions</h3>
      <div id="qaList"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getAllQA() {
      try { return JSON.parse(localStorage.getItem('productQA')) || PRODUCT_QA; } catch { return PRODUCT_QA; }
    }
    function setAllQA(qa) { localStorage.setItem('productQA', JSON.stringify(qa)); }

    function renderQA() {
      const allQA = getAllQA();
      const list = $('#qaList');
      let all = [];
      Object.entries(allQA).forEach(([pid, qs]) => {
        const p = PRODUCTS.find(x => x.id === parseInt(pid));
        qs.forEach(q => all.push({ ...q, productId: parseInt(pid), productName: p?.name || 'Unknown' }));
      });
      all.sort((a, b) => new Date(b.date) - new Date(a.date));

      if (all.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:var(--gray-900);padding:24px;font-size:.875rem">No questions yet. Be the first to ask!</p>';
        return;
      }

      list.innerHTML = all.map(q => `
        <div style="border-bottom:1px solid var(--gray-400);padding:16px 0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <span style="font-weight:600;font-size:.875rem">${q.productName}</span>
              <span style="font-size:.75rem;color:var(--gray-900);margin-left:8px">by ${q.user} • ${formatDate(q.date)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:4px;font-size:.8125rem;color:var(--gray-900)">
              <span>👍 ${q.votes}</span>
            </div>
          </div>
          <p style="font-size:.875rem;margin-bottom:6px"><strong>Q:</strong> ${q.question}</p>
          ${q.answer ? `<p style="font-size:.875rem;color:var(--gray-900);padding-left:20px;border-left:2px solid var(--primary);margin-left:8px"><strong>A:</strong> ${q.answer}</p>`
            : `<p style="font-size:.8125rem;color:var(--warning);padding-left:20px">⏳ Awaiting answer</p>`}
          <button class="btn btn-sm btn-secondary" style="margin-top:6px" onclick="upvoteQA(${q.id})">👍 Helpful</button>
        </div>
      `).join('');
    }

    function submitQuestion() {
      const pid = parseInt($('#qaProduct').value);
      const text = $('#qaQuestion').value.trim();
      if (!text) { showToast('Please enter a question', 'error'); return; }

      const allQA = getAllQA();
      if (!allQA[pid]) allQA[pid] = [];
      allQA[pid].push({
        id: Date.now(), user: 'You', question: text,
        answer: null, date: new Date().toISOString().split('T')[0], votes: 0
      });
      setAllQA(allQA);
      $('#qaQuestion').value = '';
      renderQA();
      showToast('Question submitted!', 'success');
    }

    function upvoteQA(id) {
      const allQA = getAllQA();
      for (const [pid, qs] of Object.entries(allQA)) {
        const q = qs.find(x => x.id === id);
        if (q) { q.votes++; setAllQA(allQA); renderQA(); showToast('Upvoted!', ''); return; }
      }
    }

    function initQAProductSelect() {
      const sel = $('#qaProduct');
      if (sel) sel.innerHTML = PRODUCTS.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }
    document.addEventListener('DOMContentLoaded', () => { initQAProductSelect(); renderQA(); });
  </script>
</body>
</html>

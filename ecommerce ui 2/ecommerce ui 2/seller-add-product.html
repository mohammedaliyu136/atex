<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
      </div>
    </div>
  </header>

  <div class="container" style="max-width:720px">
    <a href="seller-products.html" style="display:inline-flex;align-items:center;gap:4px;font-size:.875rem;color:var(--gray-900);margin-bottom:16px">&larr; Back to Products</a>

    <div class="card">
      <h1 style="font-size:1.5rem;margin-bottom:4px" id="formTitle">Add New Product</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem" id="formSubtitle">Fill in the details below to list your product.</p>

      <form onsubmit="event.preventDefault(); saveProduct()">
        <div class="form-group">
          <label>Product Name</label>
          <input id="prodName" placeholder="e.g., Wireless Bluetooth Earbuds" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="prodCategory">
              <option value="Electronics">Electronics</option>
              <option value="Fashion">Fashion</option>
              <option value="Home">Home</option>
              <option value="Sports">Sports</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="prodStatus">
              <option value="active">Active (Listed)</option>
              <option value="draft">Draft (Hidden)</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prodDesc" placeholder="Describe your product, features, specifications..." rows="4"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" id="prodPrice" placeholder="29.99" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label>Compare at Price ($)</label>
            <input type="number" id="prodOldPrice" placeholder="39.99" step="0.01" min="0">
            <p class="hint">Shows a strikethrough comparison price</p>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" id="prodStock" placeholder="100" min="0" required>
          </div>
          <div class="form-group">
            <label>SKU (optional)</label>
            <input id="prodSku" placeholder="Auto-generated if blank">
          </div>
        </div>
        <div class="form-group">
          <label>Product Images</label>
          <div class="upload-zone" onclick="document.getElementById('prodImages').click()" style="padding:20px">
            <div class="upload-icon">📷</div>
            <p>Click to upload product photos (up to 5)</p>
          </div>
          <input type="file" id="prodImages" accept="image/*" multiple style="display:none" onchange="handleProductImages(this)">
          <div id="imagePreview" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"></div>
        </div>

        <div id="colorSection">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label style="font-weight:600;font-size:.875rem">Colors / Variants</label>
            <button type="button" class="btn btn-sm btn-secondary" onclick="addColor()">+ Add Color</button>
          </div>
          <div id="colorList">
            <div style="display:flex;gap:8px;margin-bottom:8px" class="color-row">
              <input placeholder="Color name" value="Black" style="flex:1">
              <input type="color" value="#2D3436" style="width:48px;padding:4px;flex-shrink:0">
              <input type="number" placeholder="Qty" value="50" style="width:80px;flex-shrink:0">
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-top:24px">
          <label>Tags (comma separated)</label>
          <input id="prodTags" placeholder="e.g., wireless, bluetooth, headphones, audio">
        </div>

        <div style="display:flex;gap:12px;margin-top:24px">
          <button type="submit" class="btn btn-primary btn-lg" style="flex:1" id="saveBtn">Save & List Product</button>
          <button type="button" class="btn btn-secondary btn-lg" onclick="location.href='seller-products.html'">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let uploadedImages = [];
    let colorCount = 1;

    function handleProductImages(input) {
      if (input.files) {
        for (const f of input.files) uploadedImages.push(f.name);
        const preview = $('#imagePreview');
        preview.innerHTML = uploadedImages.map(name => `<span style="padding:6px 12px;background:var(--gray-200);border-radius:6px;font-size:.75rem">📷 ${name}</span>`).join('');
        if (uploadedImages.length > 0) showToast(uploadedImages.length + ' image(s) added', 'success');
      }
    }

    function addColor() {
      colorCount++;
      const row = document.createElement('div');
      row.className = 'color-row';
      row.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
      row.innerHTML = `
        <input placeholder="Color name" style="flex:1">
        <input type="color" value="#6C5CE7" style="width:48px;padding:4px;flex-shrink:0">
        <input type="number" placeholder="Qty" value="0" style="width:80px;flex-shrink:0">
        <button type="button" class="btn btn-sm" style="color:var(--danger)" onclick="this.parentElement.remove()">✕</button>`;
      $('#colorList').appendChild(row);
    }

    function saveProduct() {
      const name = $('#prodName').value.trim();
      if (!name) { showToast('Product name is required', 'error'); return; }

      const product = {
        name: name,
        category: $('#prodCategory').value,
        status: $('#prodStatus').value,
        description: $('#prodDesc').value.trim(),
        price: parseFloat($('#prodPrice').value) || 0,
        oldPrice: parseFloat($('#prodOldPrice').value) || null,
        stock: parseInt($('#prodStock').value) || 0,
        image: getEmojiForCategory($('#prodCategory').value),
        sold: 0,
        rating: 0,
        tags: $('#prodTags').value.split(',').map(t => t.trim()).filter(Boolean)
      };

      const editId = new URLSearchParams(location.search).get('edit');
      if (editId) {
        sellerUpdateProduct(parseInt(editId), product);
        showToast('Product updated!', 'success');
      } else {
        sellerAddProduct(product);
        showToast('Product listed successfully!', 'success');
      }

      setTimeout(() => location.href = 'seller-products.html', 1000);
    }

    function getEmojiForCategory(cat) {
      const map = { Electronics: '📱', Fashion: '👕', Home: '🏠', Sports: '⚽' };
      return map[cat] || '📦';
    }

    // Load edit data
    (function loadEdit() {
      const editId = new URLSearchParams(location.search).get('edit');
      if (editId) {
        const p = getSellerProducts().find(x => x.id === parseInt(editId));
        if (p) {
          $('#formTitle').textContent = 'Edit Product';
          $('#formSubtitle').textContent = 'Update your product details.';
          $('#saveBtn').textContent = 'Update Product';
          $('#prodName').value = p.name;
          $('#prodCategory').value = p.category;
          $('#prodStatus').value = p.status;
          $('#prodDesc').value = p.description || '';
          $('#prodPrice').value = p.price;
          if (p.oldPrice) $('#prodOldPrice').value = p.oldPrice;
          $('#prodStock').value = p.stock;
          if (p.tags) $('#prodTags').value = p.tags.join(', ');
        }
      }
    })();
  </script>
</body>
</html>

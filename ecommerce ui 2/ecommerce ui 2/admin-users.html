<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Users - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="admin-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="admin-users.html">👥 <span>Users</span></a>
        <a href="admin-disputes.html">⚖️ <span>Disputes</span></a>
        <a href="admin-categories.html">📁 <span>Categories</span></a>
        <a href="admin-content.html">🎨 <span>Content</span></a>
        <span style="font-size:.75rem;padding:4px 8px;background:var(--danger);color:#fff;border-radius:4px;font-weight:600">ADMIN</span>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">User Management</h1>
    <p style="font-size:.875rem;opacity:.9">Manage buyers, sellers, and platform accounts.</p>
  </div>

  <div class="container">
    <div class="table-wrap card" style="padding:0">
      <table>
        <thead>
          <tr><th>User</th><th>Email</th><th>Type</th><th>Status</th><th>Joined</th><th>Orders</th><th>Actions</th></tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getAdminUsers() {
      try { return JSON.parse(localStorage.getItem('adminUsers')) || ADMIN_USERS; } catch { return ADMIN_USERS; }
    }
    function setAdminUsers(u) { localStorage.setItem('adminUsers', JSON.stringify(u)); }

    function renderAdminUsers() {
      const users = getAdminUsers();
      $('#usersTable').innerHTML = users.map(u => `
        <tr>
          <td><strong>${u.name}</strong></td>
          <td>${u.email}</td>
          <td><span class="badge ${u.type === 'seller' ? 'badge-warning' : 'badge-info'}">${u.type}</span></td>
          <td><span class="badge ${u.status === 'active' ? 'badge-success' : 'badge-danger'}">${u.status}</span></td>
          <td style="font-size:.8125rem;color:var(--gray-700)">${u.joined}</td>
          <td style="text-align:center">${u.orders}</td>
          <td>
            <button class="btn btn-sm" style="background:transparent;color:var(--primary);padding:2px 6px" onclick="showToast('Edit user: ${u.name}','')">✏️</button>
            <button class="btn btn-sm" style="background:transparent;color:var(--danger);padding:2px 6px" onclick="toggleUserStatus(${u.id})">${u.status === 'active' ? '🔒' : '🔓'}</button>
          </td>
        </tr>
      `).join('');
    }

    function toggleUserStatus(id) {
      const users = getAdminUsers();
      const u = users.find(x => x.id === id);
      if (u) {
        u.status = u.status === 'active' ? 'suspended' : 'active';
        setAdminUsers(users);
        renderAdminUsers();
        showToast(`User ${u.name} ${u.status === 'active' ? 'reactivated' : 'suspended'}`, 'success');
      }
    }

    document.addEventListener('DOMContentLoaded', renderAdminUsers);
  </script>
</body>
</html>

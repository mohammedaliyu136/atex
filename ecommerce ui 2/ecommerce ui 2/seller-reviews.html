<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Reviews - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-reviews.html">⭐ <span>Reviews</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">Product Reviews</h1>
    <p style="font-size:.875rem;opacity:.9">View and respond to customer reviews.</p>
  </div>

  <div class="container" style="max-width:720px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px">
      <div class="card" style="text-align:center;padding:16px">
        <p style="font-size:.8125rem;color:var(--gray-900)">Average Rating</p>
        <p style="font-size:2rem;font-weight:800;color:#F39C12">4.1 ★</p>
      </div>
      <div class="card" style="text-align:center;padding:16px">
        <p style="font-size:.8125rem;color:var(--gray-900)">Total Reviews</p>
        <p style="font-size:2rem;font-weight:800">24</p>
      </div>
      <div class="card" style="text-align:center;padding:16px">
        <p style="font-size:.8125rem;color:var(--gray-900)">Unresponded</p>
        <p style="font-size:2rem;font-weight:800;color:var(--warning)">2</p>
      </div>
      <div class="card" style="text-align:center;padding:16px">
        <p style="font-size:.8125rem;color:var(--gray-900)">Response Rate</p>
        <p style="font-size:2rem;font-weight:800;color:var(--success)">50%</p>
      </div>
    </div>

    <div id="reviewsList"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getSellerReviews() {
      try { return JSON.parse(localStorage.getItem('sellerReviews')) || SELLER_REVIEWS_RECEIVED; } catch { return SELLER_REVIEWS_RECEIVED; }
    }
    function setSellerReviews(r) { localStorage.setItem('sellerReviews', JSON.stringify(r)); }

    function renderSellerReviews() {
      const reviews = getSellerReviews();
      const list = $('#reviewsList');

      if (reviews.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">⭐</div><h3>No reviews yet</h3></div>';
        return;
      }

      list.innerHTML = reviews.map(r => `
        <div class="card" style="margin-bottom:12px;padding:20px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="font-weight:600">${r.product}</span>
                <span style="color:#F39C12;font-size:.875rem">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
              </div>
              <p style="font-size:.8125rem;color:var(--gray-900)">by ${r.user} • ${formatDate(r.date)}</p>
              <p style="font-size:.875rem;margin:8px 0">"${r.text}"</p>
              ${r.responded ? `<p style="font-size:.8125rem;color:var(--gray-900);padding:8px 12px;background:var(--gray-200);border-radius:6px;margin-top:4px"><strong>Your response:</strong> ${r.response}</p>` : ''}
            </div>
            <div>
              ${!r.responded ? `<button class="btn btn-sm btn-primary" onclick="respondToReview(${r.id})">💬 Respond</button>` : `<span class="badge badge-success">Responded</span>`}
            </div>
          </div>
        </div>
      `).join('');
    }

    function respondToReview(id) {
      const response = prompt('Write your response to this review:');
      if (!response || !response.trim()) return;
      const reviews = getSellerReviews();
      const r = reviews.find(x => x.id === id);
      if (r) { r.responded = true; r.response = response.trim(); setSellerReviews(reviews); renderSellerReviews(); showToast('Response posted!', 'success'); }
    }

    document.addEventListener('DOMContentLoaded', renderSellerReviews);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:480px">
    <div class="card" style="margin-top:32px;text-align:center">
      <div style="font-size:3rem;margin-bottom:8px">📧</div>
      <h1 style="font-size:1.5rem;margin-bottom:4px">Verify Your Email</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Enter the 6-digit code sent to you@example.com</p>

      <div class="otp-inputs">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpNext(this)" autofocus>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpNext(this)">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpNext(this)">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpNext(this)">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpNext(this)">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpNext(this)">
      </div>

      <button class="btn btn-primary btn-block btn-lg" onclick="location.href='set-password.html'">Verify & Continue</button>

      <p style="margin-top:16px;font-size:.875rem;color:var(--gray-900)">
        Didn't get the code? <a href="#" style="color:var(--primary);font-weight:600" onclick="showToast('New code sent!','success')">Resend</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function otpNext(el) {
      if (el.value.length >= 1) {
        const next = el.nextElementSibling;
        if (next) next.focus();
      }
    }
  </script>
</body>
</html>

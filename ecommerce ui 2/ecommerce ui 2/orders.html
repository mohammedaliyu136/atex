<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="orders.html">👤 <span>Account</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>My Orders</h1>
    <p>Track, manage, and review your orders.</p>
  </div>

  <div class="container" style="max-width:900px">
    <div class="tabs">
      <div class="tab active" onclick="filterOrders(this, 'all')">All</div>
      <div class="tab" onclick="filterOrders(this, 'processing')">Processing</div>
      <div class="tab" onclick="filterOrders(this, 'shipped')">Shipped</div>
      <div class="tab" onclick="filterOrders(this, 'delivered')">Delivered</div>
    </div>
    <div id="ordersList"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderOrders(filter = 'all') {
      const list = $('#ordersList');
      const filtered = filter === 'all' ? ORDERS : ORDERS.filter(o => o.status === filter);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>No orders found</h3><p>You haven\'t placed any orders yet.</p><a href="index.html" class="btn btn-primary">Start Shopping</a></div>';
        return;
      }

      list.innerHTML = filtered.map(o => {
        const statusColor = o.status === 'delivered' ? 'badge-success' : o.status === 'shipped' ? 'badge-info' : 'badge-warning';
        return `
        <div class="card" style="margin-bottom:12px;padding:20px;cursor:pointer" onclick="location.href='tracking.html?id=${o.id}'">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div>
              <span style="font-weight:600">${o.id}</span>
              <span style="font-size:.8125rem;color:var(--gray-900);margin-left:8px">${formatDate(o.date)}</span>
            </div>
            <span class="badge ${statusColor}" style="text-transform:capitalize">${o.status}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <span style="font-size:.875rem;color:var(--gray-900)">${o.items} item${o.items > 1 ? 's' : ''} • ${o.tracking}</span>
            <span style="font-weight:700;color:var(--primary)">$${o.total.toFixed(2)}</span>
          </div>
          ${o.status === 'delivered' ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-400);display:flex;gap:12px">
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();location.href='reviews.html'">Write a Review</button>
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();location.href='returns.html'">Return</button>
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();showToast('Order reordered!','success')">Reorder</button>
          </div>` : o.status === 'shipped' ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-400)">
            <a href="tracking.html?id=${o.id}" class="btn btn-primary btn-sm">Track Order</a>
          </div>` : ''}
        </div>`;
      }).join('');
    }

    function filterOrders(el, filter) {
      $$('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderOrders(filter);
    }

    document.addEventListener('DOMContentLoaded', () => renderOrders('all'));
  </script>
</body>
</html>

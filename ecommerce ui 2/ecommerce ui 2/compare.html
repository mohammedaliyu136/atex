<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Products - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="notifications.html">🔔 <span>Alerts</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>Compare Products</h1>
    <p>Select up to 4 products to compare side by side.</p>
  </div>

  <div class="container">
    <div class="page-header">
      <div>
        <span style="font-size:.875rem;color:var(--gray-900)" id="compareCount">0 of 4 selected</span>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="clearCompare()">Clear All</button>
    </div>

    <div class="product-grid" id="compareGrid"></div>

    <div id="compareTable" style="display:none"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getCompareList() {
      try { return JSON.parse(localStorage.getItem('compareList')) || []; } catch { return []; }
    }
    function setCompareList(list) { localStorage.setItem('compareList', JSON.stringify(list)); }
    function toggleCompare(id) {
      let list = getCompareList();
      const idx = list.indexOf(id);
      if (idx > -1) { list.splice(idx, 1); showToast('Removed from comparison', ''); }
      else { if (list.length >= 4) { showToast('Max 4 products for comparison', 'error'); return; }
        list.push(id); showToast('Added to comparison', 'success'); }
      setCompareList(list);
      renderCompare();
    }

    function renderCompare() {
      const ids = getCompareList();
      const products = ids.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
      $('#compareCount').textContent = products.length + ' of 4 selected';

      const grid = $('#compareGrid');
      grid.innerHTML = PRODUCTS.map(p => {
        const selected = ids.includes(p.id);
        return `<div class="product-card" style="${selected ? 'border:2px solid var(--primary)' : ''}">
          <div class="product-image" style="height:140px;font-size:2rem">
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
            <a href="product.html?id=${p.id}">${p.image}</a>
          </div>
          <div class="product-body" style="padding:12px">
            <a href="product.html?id=${p.id}" class="product-title" style="font-size:.8125rem">${p.name}</a>
            <div class="product-price"><span class="price-current">$${p.price.toFixed(2)}</span></div>
          </div>
          <div class="product-actions" style="padding:0 12px 12px">
            <button class="btn btn-sm ${selected ? 'btn-primary' : 'btn-secondary'} btn-block" onclick="toggleCompare(${p.id})">${selected ? '✓ Selected' : 'Compare'}</button>
          </div>
        </div>`;
      }).join('');

      const table = $('#compareTable');
      if (products.length < 2) { table.style.display = 'none'; return; }
      table.style.display = 'block';

      const rows = [
        { label: 'Image', render: (p) => `<span style="font-size:3rem">${p.image}</span>` },
        { label: 'Price', render: (p) => `<span style="font-weight:700;color:var(--primary);font-size:1.125rem">$${p.price.toFixed(2)}</span>${p.oldPrice ? `<br><span style="font-size:.8125rem;color:var(--gray-700);text-decoration:line-through">$${p.oldPrice.toFixed(2)}</span>` : ''}` },
        { label: 'Rating', render: (p) => `<span style="color:#F39C12">${starsHTML(p.rating)}</span><br><span style="font-size:.8125rem">${p.rating} (${p.reviews} reviews)</span>` },
        { label: 'Category', render: (p) => p.category },
        { label: 'Colors', render: (p) => p.colors ? p.colors.map(c => `<span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:${c};border:1px solid var(--gray-400);margin:2px"></span>`).join('') : '—' },
        { label: 'Badge', render: (p) => p.badge ? `<span class="badge badge-danger">${p.badge}</span>` : '—' }
      ];

      table.innerHTML = `
        <div class="card" style="overflow-x:auto;padding:20px">
          <h3 style="margin-bottom:16px">Comparison Table</h3>
          <table>
            <thead><tr><th style="min-width:120px">Feature</th>${products.map(p => `<th style="text-align:center;min-width:160px">${p.name}</th>`).join('')}</tr></thead>
            <tbody>
              ${rows.map(r => `<tr><td style="font-weight:600">${r.label}</td>${products.map(p => `<td style="text-align:center">${r.render(p)}</td>`).join('')}</tr>`).join('')}
              <tr><td style="font-weight:600">Actions</td>${products.map(p => `<td style="text-align:center"><button class="btn btn-primary btn-sm" onclick="addToCart(${p.id}); showToast('${p.name} added to cart','success')">Add to Cart</button></td>`).join('')}</tr>
            </tbody>
          </table>
        </div>`;
    }

    function clearCompare() { setCompareList([]); renderCompare(); showToast('Comparison cleared', ''); }

    document.addEventListener('DOMContentLoaded', renderCompare);
  </script>
</body>
</html>

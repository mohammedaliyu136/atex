<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="notifications.html">🔔 <span>Alerts</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>Frequently Asked Questions</h1>
    <p>Find answers to common questions about shopping on ShopWave.</p>
  </div>

  <div class="container" style="max-width:720px">
    <div class="tabs" style="margin-bottom:24px">
      <div class="tab active" onclick="switchFaqTab(this,'ordering')">Ordering</div>
      <div class="tab" onclick="switchFaqTab(this,'shipping')">Shipping</div>
      <div class="tab" onclick="switchFaqTab(this,'returns')">Returns</div>
      <div class="tab" onclick="switchFaqTab(this,'payment')">Payment</div>
      <div class="tab" onclick="switchFaqTab(this,'account')">Account</div>
    </div>

    <div id="faq-ordering" class="faq-section"><div class="card" style="padding:0" id="faqOrderingContent"></div></div>
    <div id="faq-shipping" class="faq-section" style="display:none"><div class="card" style="padding:0" id="faqShippingContent"></div></div>
    <div id="faq-returns" class="faq-section" style="display:none"><div class="card" style="padding:0" id="faqReturnsContent"></div></div>
    <div id="faq-payment" class="faq-section" style="display:none"><div class="card" style="padding:0" id="faqPaymentContent"></div></div>
    <div id="faq-account" class="faq-section" style="display:none"><div class="card" style="padding:0" id="faqAccountContent"></div></div>

    <div class="card" style="margin-top:16px;text-align:center;padding:24px">
      <p style="font-size:.875rem;color:var(--gray-900);margin-bottom:12px">Didn't find what you're looking for?</p>
      <a href="support.html" class="btn btn-primary">Contact Support</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const FAQ_DATA = {
      ordering: [
        { q: 'How do I place an order?', a: 'Browse products, add items to your cart, proceed to checkout, enter your shipping details, select a payment method, and confirm your order.' },
        { q: 'Can I modify or cancel my order?', a: 'Orders can be modified or cancelled within 1 hour of placement. Go to My Orders and select the order you want to change, or contact support immediately.' },
        { q: 'How do I track my order?', a: 'Go to My Orders, click on the order you want to track, and you\'ll see the real-time tracking timeline with detailed status updates.' },
        { q: 'What if my order arrives damaged?', a: 'Contact support within 48 hours of delivery with photos of the damage. We\'ll arrange a replacement or refund.' }
      ],
      shipping: [
        { q: 'What shipping options do you offer?', a: 'We offer Standard (5-7 business days), Express (2-3 business days), and Next Day Delivery options.' },
        { q: 'How much does shipping cost?', a: 'Standard shipping is $5.99. Free standard shipping on orders over $50. Express is $14.99 and Next Day is $24.99.' },
        { q: 'Do you ship internationally?', a: 'Yes, we ship to over 15 countries. International shipping rates and times vary by destination.' }
      ],
      returns: [
        { q: 'What is your return policy?', a: 'We offer 30-day returns from delivery. Items must be unused and in original packaging. Start a return from the Returns page.' },
        { q: 'How do I return an item?', a: 'Go to Returns & Refunds, select the order and items you want to return, choose a reason, and submit. We\'ll email you a return label.' },
        { q: 'How long does a refund take?', a: 'Refunds are processed within 5-7 business days after we receive the returned item. Store credit is issued immediately.' },
        { q: 'Can I exchange an item?', a: 'We don\'t offer direct exchanges. Please return the item and place a new order for the replacement.' }
      ],
      payment: [
        { q: 'What payment methods do you accept?', a: 'We accept Visa, Mastercard, American Express, Discover, bank transfers, Apple Pay, Google Pay, and ShopWave gift cards.' },
        { q: 'Is my payment information secure?', a: 'Yes! We use industry-standard SSL encryption and never store full card details. All payments are PCI-DSS compliant.' },
        { q: 'What is 3D Secure?', a: '3D Secure is an additional security layer for online payments. Your bank may require an OTP sent to your phone to authorize the transaction.' }
      ],
      account: [
        { q: 'How do I create an account?', a: 'Click Sign In, then "Create account". Enter your email or phone, verify with OTP, set a password, and complete your profile.' },
        { q: 'How do I reset my password?', a: 'Click "Forgot Password" on the sign-in page, enter your email, and we\'ll send you a reset link.' },
        { q: 'Can I delete my account?', a: 'Yes, contact support to request account deletion. Note that this is irreversible and all your data will be permanently removed.' }
      ]
    };
    function renderFaqs() {
      const map = { ordering: 'faqOrderingContent', shipping: 'faqShippingContent', returns: 'faqReturnsContent', payment: 'faqPaymentContent', account: 'faqAccountContent' };
      for (const [key, items] of Object.entries(FAQ_DATA)) {
        const el = $('#' + map[key]);
        if (!el) continue;
        el.innerHTML = items.map((item, i) => `
          <div style="border-bottom:${i < items.length - 1 ? '1px solid var(--gray-400)' : 'none'}">
            <button style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;font-weight:600;font-size:.875rem;text-align:left" onclick="toggleFaq(this)">
              <span>${item.q}</span>
              <span style="font-size:1.25rem;transition:transform .3s">▸</span>
            </button>
            <div class="faq-answer" style="display:none;padding:0 20px 16px;font-size:.875rem;color:var(--gray-900)">${item.a}</div>
          </div>
        `).join('');
      }
    }
    function switchFaqTab(el, section) {
      $$('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active');
      $$('.faq-section').forEach(s => s.style.display = 'none');
      $(`#faq-${section}`).style.display = 'block';
    }
    function toggleFaq(btn) {
      const answer = btn.nextElementSibling;
      const arrow = btn.querySelector('span:last-child');
      if (answer.style.display === 'none') {
        answer.style.display = 'block';
        arrow.style.transform = 'rotate(90deg)';
      } else {
        answer.style.display = 'none';
        arrow.style.transform = '';
      }
    }
    document.addEventListener('DOMContentLoaded', renderFaqs);
  </script>
</body>
</html>

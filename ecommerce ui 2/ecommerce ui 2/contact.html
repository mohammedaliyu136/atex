<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="index.html">🏠 <span>Home</span></a>
        <a href="support.html">💬 <span>Support</span></a>
        <a href="contact.html">📞 <span>Contact</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">Contact Us</h1>
    <p style="font-size:.875rem;opacity:.9">We'd love to hear from you. Get in touch with our team.</p>
  </div>

  <div class="container" style="max-width:640px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px">
      <div class="card" style="text-align:center;padding:20px">
        <div style="font-size:2rem;margin-bottom:8px">📧</div>
        <strong>Email</strong>
        <p style="font-size:.875rem">support@shopwave.com</p>
      </div>
      <div class="card" style="text-align:center;padding:20px">
        <div style="font-size:2rem;margin-bottom:8px">📞</div>
        <strong>Phone</strong>
        <p style="font-size:.875rem">+1 (800) 123-4567</p>
      </div>
      <div class="card" style="text-align:center;padding:20px">
        <div style="font-size:2rem;margin-bottom:8px">📍</div>
        <strong>Address</strong>
        <p style="font-size:.875rem">123 Commerce St, Suite 100<br>San Francisco, CA 94102</p>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:16px">Send us a Message</h3>
      <div class="form-group"><label>Name</label><input id="contactName" placeholder="Your name"></div>
      <div class="form-group"><label>Email</label><input type="email" id="contactEmail" placeholder="your@email.com"></div>
      <div class="form-group"><label>Subject</label><select id="contactSubject"><option>General Inquiry</option><option>Order Issue</option><option>Seller Enquiry</option><option>Partnership</option><option>Other</option></select></div>
      <div class="form-group"><label>Message</label><textarea id="contactMessage" rows="4" placeholder="How can we help?"></textarea></div>
      <button class="btn btn-primary" onclick="submitContact()">Send Message</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function submitContact() {
      const name = $('#contactName').value.trim();
      if (!name) { showToast('Please enter your name', 'error'); return; }
      showToast('Message sent! We will get back to you within 24 hours.', 'success');
    }
  </script>
</body>
</html>

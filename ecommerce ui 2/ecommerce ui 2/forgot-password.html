<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:440px">
    <div class="card" style="margin-top:32px;text-align:center">
      <div style="font-size:3rem;margin-bottom:12px">🔐</div>
      <h1 style="font-size:1.5rem;margin-bottom:4px">Forgot Password?</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Enter your email and we'll send you a reset link.</p>

      <form onsubmit="event.preventDefault(); showToast('Reset link sent! Check your email.','success')">
        <div class="form-group" style="text-align:left">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
      </form>

      <p style="margin-top:16px;font-size:.875rem;color:var(--gray-900)">
        Remember your password? <a href="signin.html" style="color:var(--primary);font-weight:600">Sign in</a>
      </p>
    </div>

    <div class="card" style="margin-top:16px;display:none" id="resetSent">
      <div style="text-align:center">
        <div style="font-size:2.5rem;margin-bottom:8px">✅</div>
        <h3 style="margin-bottom:4px">Email Sent</h3>
        <p style="font-size:.875rem;color:var(--gray-900);margin-bottom:16px">If an account exists with that email, you'll receive a password reset link shortly.</p>
        <button class="btn btn-secondary btn-sm" onclick="showToast('New reset link sent!','success')">Resend</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

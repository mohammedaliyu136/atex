<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Categories - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="admin-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="admin-users.html">👥 <span>Users</span></a>
        <a href="admin-disputes.html">⚖️ <span>Disputes</span></a>
        <a href="admin-categories.html">📁 <span>Categories</span></a>
        <a href="admin-content.html">🎨 <span>Content</span></a>
        <span style="font-size:.75rem;padding:4px 8px;background:var(--danger);color:#fff;border-radius:4px;font-weight:600">ADMIN</span>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div><h1 style="font-size:1.5rem">Category Management</h1><p style="font-size:.875rem;opacity:.9">Add, edit, and organize product categories.</p></div>
      <button class="btn" style="background:#fff;color:var(--primary);font-weight:700" onclick="showAddCategory()">+ Add Category</button>
    </div>
  </div>

  <div class="container" style="max-width:640px">
    <div id="categoryList"></div>
    <div id="addCatForm" class="card" style="display:none;margin-top:16px">
      <h3 style="margin-bottom:12px">Add Category</h3>
      <div class="form-group"><label>Category Name</label><input id="catName" placeholder="e.g., Electronics"></div>
      <div class="form-group"><label>Icon (emoji)</label><input id="catIcon" placeholder="📱" maxlength="2" style="width:60px"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" onclick="saveCategory()">Save</button>
        <button class="btn btn-secondary" onclick="toggleCatForm()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getAdminCats() {
      try { return JSON.parse(localStorage.getItem('adminCategories')) || ADMIN_CATEGORIES; } catch { return ADMIN_CATEGORIES; }
    }
    function setAdminCats(c) { localStorage.setItem('adminCategories', JSON.stringify(c)); }

    function renderAdminCats() {
      const cats = getAdminCats();
      const icons = ['📱','👗','🏡','⚽'];
      $('#categoryList').innerHTML = cats.map((c, i) => `
        <div class="card" style="margin-bottom:8px;padding:16px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:12px">
              <span style="font-size:1.5rem">${icons[i] || '📁'}</span>
              <div><strong>${c.name}</strong><br><span style="font-size:.8125rem;color:var(--gray-700)">${c.products} products</span></div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-sm" style="background:transparent;color:var(--danger);padding:2px 6px" onclick="deleteCategory(${c.id})">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function showAddCategory() { toggleCatForm(); }
    function toggleCatForm() {
      const f = $('#addCatForm');
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }
    function saveCategory() {
      const name = $('#catName').value.trim();
      if (!name) { showToast('Enter category name', 'error'); return; }
      const cats = getAdminCats();
      cats.push({ id: Date.now(), name, icon: $('#catIcon').value || '📁', count: 0 });
      setAdminCats(cats);
      renderAdminCats();
      toggleCatForm();
      showToast('Category added', 'success');
    }
    function deleteCategory(id) {
      if (!confirm('Delete this category?')) return;
      const cats = getAdminCats().filter(c => c.id !== id);
      setAdminCats(cats);
      renderAdminCats();
      showToast('Category deleted', '');
    }

    document.addEventListener('DOMContentLoaded', renderAdminCats);
  </script>
</body>
</html>

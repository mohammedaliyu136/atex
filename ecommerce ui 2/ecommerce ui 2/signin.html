<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cookie-bar" id="cookieBar"><p>🍪 This site uses cookies.</p><button class="btn btn-primary btn-sm" onclick="acceptCookies()">Accept</button></div>
  <div style="position:fixed;bottom:80px;right:24px;z-index:500"><button id="darkModeToggle" class="btn btn-sm" style="background:var(--white);box-shadow:var(--shadow);border-radius:50%;width:48px;height:48px;font-size:1.25rem;padding:0">🌙</button></div>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:440px">
    <div class="card" style="margin-top:32px">
      <h1 style="font-size:1.5rem;margin-bottom:4px">Welcome Back</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Sign in to your account.</p>

      <form onsubmit="event.preventDefault(); location.href='index.html'">
        <div class="form-group">
          <label>Email or Phone</label>
          <input type="text" placeholder="you@example.com or +1 555 000 0000" required>
        </div>
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label>Password</label>
            <a href="forgot-password.html" style="font-size:.8125rem;color:var(--primary);font-weight:600">Forgot?</a>
          </div>
          <input type="password" placeholder="Enter your password" required>
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" checked>
            <span style="font-size:.875rem">Remember me</span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:.875rem;color:var(--gray-900)">
        Don't have an account? <a href="signup.html" style="color:var(--primary);font-weight:600">Create one</a>
      </p>

      <div style="display:flex;align-items:center;gap:12px;margin-top:20px">
        <hr style="flex:1;border:none;border-top:1px solid var(--gray-400)">
        <span style="font-size:.75rem;color:var(--gray-700)">OR</span>
        <hr style="flex:1;border:none;border-top:1px solid var(--gray-400)">
      </div>

      <div style="display:flex;gap:12px;margin-top:16px">
        <button class="btn btn-secondary btn-block" onclick="showToast('Google sign in','success')" style="font-size:.875rem">G</button>
        <button class="btn btn-secondary btn-block" onclick="showToast('Apple sign in','success')" style="font-size:.875rem"></button>
        <button class="btn btn-secondary btn-block" onclick="showToast('Facebook sign in','success')" style="font-size:.875rem">f</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search products..." id="searchInput" onkeydown="if(event.key==='Enter')doSearch()">
      </div>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="orders.html">👤 <span>Account</span></a>
      </div>
    </div>
  </header>

  <div class="container">
    <div style="margin-bottom:24px" id="searchHeader"></div>

    <div class="filter-bar">
      <select id="categoryFilter" onchange="doSearch()">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Sports">Sports</option>
        <option value="Home">Home</option>
      </select>
      <select id="sortFilter" onchange="doSearch()">
        <option value="default">Sort by: Default</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Highest Rated</option>
      </select>
      <span id="resultCount" style="font-size:.875rem;color:var(--gray-900);margin-left:auto"></span>
    </div>

    <div class="product-grid" id="searchResults"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function doSearch() {
      const urlParams = new URLSearchParams(location.search);
      const query = ($('#searchInput')?.value || urlParams.get('q') || '').toLowerCase();
      const cat = $('#categoryFilter')?.value || '';
      const sort = $('#sortFilter')?.value || 'default';

      if ($('#searchInput')) $('#searchInput').value = query;

      let results = [...PRODUCTS];

      if (query) {
        results = results.filter(p =>
          p.name.toLowerCase().includes(query) ||
          p.category.toLowerCase().includes(query) ||
          p.name.toLowerCase().split(' ').some(w => w.startsWith(query))
        );
      }
      if (cat) results = results.filter(p => p.category === cat);

      switch (sort) {
        case 'price-asc': results.sort((a, b) => a.price - b.price); break;
        case 'price-desc': results.sort((a, b) => b.price - a.price); break;
        case 'rating': results.sort((a, b) => b.rating - a.rating); break;
      }

      const header = $('#searchHeader');
      if (query) {
        header.innerHTML = `<h1 style="font-size:1.5rem">Results for "${query}"</h1><p style="color:var(--gray-900);font-size:.875rem">${results.length} product${results.length !== 1 ? 's' : ''} found</p>`;
      } else {
        header.innerHTML = `<h1 style="font-size:1.5rem">Browse All Products</h1><p style="color:var(--gray-900);font-size:.875rem">${results.length} product${results.length !== 1 ? 's' : ''} available</p>`;
      }

      $('#resultCount').textContent = results.length + ' result' + (results.length !== 1 ? 's' : '');

      const grid = $('#searchResults');
      if (results.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>No results found</h3><p>Try different keywords or browse categories.</p><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="index.html" class="btn btn-primary">Browse All</a><a href="category.html" class="btn btn-secondary">Categories</a></div></div>';
        return;
      }

      grid.innerHTML = results.map(p => `
        <div class="product-card">
          <div class="product-image">
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
            <button class="wishlist-btn" data-id="${p.id}" onclick="toggleWishlist(${p.id})">♡</button>
            <a href="product.html?id=${p.id}">${p.image}</a>
          </div>
          <div class="product-body">
            <a href="product.html?id=${p.id}" class="product-title">${highlight(p.name, query)}</a>
            <div class="product-category">${p.category}</div>
            <div class="product-rating">${starsHTML(p.rating)} ${p.rating}</div>
            <div class="product-price">
              <span class="price-current">$${p.price.toFixed(2)}</span>
              ${p.oldPrice ? `<span class="price-old">$${p.oldPrice.toFixed(2)}</span>` : ''}
            </div>
          </div>
          <div class="product-actions">
            <button class="btn btn-primary btn-sm btn-block" onclick="addToCart(${p.id})">Add to Cart</button>
          </div>
        </div>
      `).join('');
      updateWishlistUI();
    }

    function highlight(text, query) {
      if (!query) return text;
      const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return text.replace(re, '<mark style="background:#FDCB6E;padding:0 2px;border-radius:2px">$1</mark>');
    }

    document.addEventListener('DOMContentLoaded', doSearch);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Registration - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:600px">
    <div class="steps" style="margin-top:16px">
      <div class="step active"><div class="step-number">1</div><div class="step-label">Account</div></div>
      <div class="step"><div class="step-number">2</div><div class="step-label">Business</div></div>
      <div class="step"><div class="step-number">3</div><div class="step-label">Verification</div></div>
      <div class="step"><div class="step-number">4</div><div class="step-label">Store</div></div>
    </div>

    <div class="card">
      <h1 style="font-size:1.5rem;margin-bottom:4px">Create Seller Account</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Start your journey as a ShopWave seller.</p>

      <form onsubmit="event.preventDefault(); location.href='seller-kyc.html'">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input placeholder="John" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input placeholder="Doe" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="seller@example.com" required>
          <p class="hint">We'll send verification and payout notifications here.</p>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="+1 (555) 000-0000" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Min. 8 characters" minlength="8" required>
        </div>
        <div class="form-group">
          <label>Referral Code (optional)</label>
          <input placeholder="Enter referral code">
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" required>
            <span style="font-size:.875rem">I agree to the <a href="terms.html" style="color:var(--primary);font-weight:600">Seller Terms & Conditions</a> and <a href="terms.html" style="color:var(--primary);font-weight:600">Commission Agreement</a></span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account & Continue</button>
      </form>

      <p style="text-align:center;margin-top:16px;font-size:.875rem;color:var(--gray-900)">
        Already a seller? <a href="seller-dashboard.html" style="color:var(--primary);font-weight:600">Go to Dashboard</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

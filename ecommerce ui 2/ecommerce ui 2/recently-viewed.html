<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recently Viewed - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="signin.html">👤 <span>Sign In</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>Recently Viewed</h1>
    <p>Products you've checked out recently.</p>
  </div>

  <div class="container">
    <div class="page-header">
      <div><span id="rvCount" style="font-size:.875rem;color:var(--gray-900)">0 products</span></div>
      <button class="btn btn-sm btn-secondary" onclick="clearRecentlyViewed()">Clear History</button>
    </div>
    <div class="product-grid" id="rvGrid"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderRecentlyViewed() {
      const ids = getRecentlyViewed();
      const products = ids.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
      const grid = $('#rvGrid');

      $('#rvCount').textContent = products.length + ' product' + (products.length !== 1 ? 's' : '');

      if (products.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🕐</div><h3>No recently viewed products</h3><p>Start browsing to see your history here.</p><a href="index.html" class="btn btn-primary">Browse Products</a></div>';
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-image">
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
            <button class="wishlist-btn" data-id="${p.id}" onclick="toggleWishlist(${p.id})">♡</button>
            <a href="product.html?id=${p.id}">${p.image}</a>
          </div>
          <div class="product-body">
            <a href="product.html?id=${p.id}" class="product-title">${p.name}</a>
            <div class="product-category">${p.category}</div>
            <div class="product-price"><span class="price-current">$${p.price.toFixed(2)}</span>${p.oldPrice ? `<span class="price-old">$${p.oldPrice.toFixed(2)}</span>` : ''}</div>
          </div>
          <div class="product-actions">
            <button class="btn btn-primary btn-sm btn-block" onclick="addToCart(${p.id})">Add to Cart</button>
          </div>
        </div>
      `).join('');
      updateWishlistUI();
    }

    function clearRecentlyViewed() {
      localStorage.removeItem('recentlyViewed');
      renderRecentlyViewed();
      showToast('History cleared', 'success');
    }

    document.addEventListener('DOMContentLoaded', renderRecentlyViewed);
  </script>
</body>
</html>

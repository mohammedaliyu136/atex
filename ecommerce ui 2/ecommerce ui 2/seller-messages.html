<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-messages.html">💬 <span>Messages</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">Messages</h1>
    <p style="font-size:.875rem;opacity:.9">Communicate with your buyers.</p>
  </div>

  <div class="container" style="max-width:800px">
    <div style="display:grid;grid-template-columns:300px 1fr;gap:16px;min-height:480px">
      <div class="card" style="padding:0;overflow-y:auto">
        <div style="padding:12px;border-bottom:1px solid var(--gray-400);font-weight:600;font-size:.875rem">Inbox</div>
        <div id="messageList"></div>
      </div>
      <div class="card" id="messageDetail" style="display:flex;flex-direction:column">
        <div id="messageHeader" style="padding-bottom:12px;border-bottom:1px solid var(--gray-400);margin-bottom:12px">
          <p style="font-size:.875rem;color:var(--gray-900)">Select a conversation</p>
        </div>
        <div id="messageBody" style="flex:1;overflow-y:auto;margin-bottom:12px;min-height:200px"></div>
        <div id="messageReply" style="display:flex;gap:8px;border-top:1px solid var(--gray-400);padding-top:12px">
          <input id="replyInput" placeholder="Type your reply..." style="flex:1">
          <button class="btn btn-primary btn-sm" onclick="sendReply()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getSellerMsgs() {
      try { return JSON.parse(localStorage.getItem('sellerMessages')) || SELLER_MESSAGES; } catch { return SELLER_MESSAGES; }
    }
    function setSellerMsgs(m) { localStorage.setItem('sellerMessages', JSON.stringify(m)); }

    let activeConversation = null;

    function renderConversations() {
      const msgs = getSellerMsgs();
      const list = $('#messageList');
      list.innerHTML = msgs.map(m => `
        <div style="padding:12px 16px;border-bottom:1px solid var(--gray-400);cursor:pointer;${!m.read ? 'background:var(--gray-100);font-weight:600' : ''}" onclick="openConversation(${m.id})">
          <p style="font-size:.875rem">${m.from}</p>
          <p style="font-size:.75rem;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.subject}</p>
          <p style="font-size:.6875rem;color:var(--gray-700)">${formatDate(m.date)}</p>
        </div>
      `).join('');
    }

    function openConversation(id) {
      const msgs = getSellerMsgs();
      const conv = msgs.find(m => m.id === id);
      if (!conv) return;
      activeConversation = id;
      conv.read = true;
      setSellerMsgs(msgs);
      renderConversations();

      $('#messageHeader').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><p style="font-weight:600">${conv.from}</p><p style="font-size:.8125rem;color:var(--gray-900)">${conv.subject}</p></div>
          <button class="btn btn-sm btn-secondary" onclick="showToast('Archived','')">📁 Archive</button>
        </div>`;

      $('#messageBody').innerHTML = conv.messages.map(msg => `
        <div style="margin-bottom:8px;display:flex;flex-direction:column;align-items:${msg.from === 'You' ? 'flex-end' : 'flex-start'}">
          <div style="background:${msg.from === 'You' ? 'var(--primary)' : 'var(--gray-200)'};color:${msg.from === 'You' ? '#fff' : 'var(--dark)'};padding:10px 16px;border-radius:16px ${msg.from === 'You' ? '16px 4px' : '4px 16px'};max-width:80%;font-size:.875rem">
            <p>${msg.text}</p>
          </div>
          <span style="font-size:.6875rem;color:var(--gray-700);margin-top:2px">${msg.from} • ${msg.time}</span>
        </div>
      `).join('');
    }

    function sendReply() {
      const text = $('#replyInput').value.trim();
      if (!text || !activeConversation) return;
      const msgs = getSellerMsgs();
      const conv = msgs.find(m => m.id === activeConversation);
      if (conv) {
        conv.messages.push({ from: 'You', text: text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        setSellerMsgs(msgs);
        $('#replyInput').value = '';
        openConversation(activeConversation);
        showToast('Message sent!', 'success');
      }
    }

    document.addEventListener('DOMContentLoaded', renderConversations);
  </script>
</body>
</html>

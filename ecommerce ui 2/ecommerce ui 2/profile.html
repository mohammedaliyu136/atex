<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Profile - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
      </div>
    </div>
  </header>

  <div class="container" style="max-width:560px">
    <div class="card" style="margin-top:32px">
      <h1 style="font-size:1.5rem;margin-bottom:4px">Complete Your Profile</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Tell us a bit about yourself.</p>

      <form onsubmit="event.preventDefault(); location.href='kyc.html'">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="John" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe" required>
          </div>
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" placeholder="How others see you">
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" required>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select>
            <option value="">Prefer not to say</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div style="display:flex;gap:12px;margin-top:24px">
          <button type="button" class="btn btn-secondary" onclick="location.href='index.html'">Skip</button>
          <button type="submit" class="btn btn-primary" style="flex:1">Continue to KYC</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

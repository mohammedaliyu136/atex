<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:480px">
    <div class="card" style="margin-top:32px">
      <h1 style="font-size:1.5rem;margin-bottom:4px">Create Account</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Join ShopWave and start shopping.</p>

      <form onsubmit="event.preventDefault(); location.href='verify-otp.html'">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="+1 (555) 000-0000">
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" required>
            <span style="font-size:.875rem">I agree to the <a href="terms.html" style="color:var(--primary);font-weight:600">Terms & Privacy Policy</a></span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
      </form>

      <p style="text-align:center;margin-top:16px;font-size:.875rem;color:var(--gray-900)">
        Already have an account? <a href="signin.html" style="color:var(--primary);font-weight:600">Sign in</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Onboarding - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cookie-bar" id="cookieBar"><p>🍪 This site uses cookies.</p><button class="btn btn-primary btn-sm" onclick="acceptCookies()">Accept</button></div>
  <div style="position:fixed;bottom:80px;right:24px;z-index:500"><button id="darkModeToggle" class="btn btn-sm" style="background:var(--white);box-shadow:var(--shadow);border-radius:50%;width:48px;height:48px;font-size:1.25rem;padding:0">🌙</button></div>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-onboarding.html">📋 <span>Setup</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px">
    <h1 style="font-size:1.5rem">Complete Your Store Setup</h1>
    <p style="font-size:.875rem;opacity:.9">Track your onboarding progress.</p>
  </div>

  <div class="container" style="max-width:600px">
    <div id="onboardingSteps"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getOnboarding() {
      try { return JSON.parse(localStorage.getItem('sellerOnboarding')) || { account: true, store: true, products: true, kyc: false, payment: false }; } catch { return { account: true, store: true, products: true, kyc: false, payment: false }; }
    }
    function setOnboarding(d) { localStorage.setItem('sellerOnboarding', JSON.stringify(d)); }

    function renderOnboarding() {
      const data = getOnboarding();
      const steps = [
        { key: 'account', label: 'Create Account', done: data.account, link: 'seller-signup.html' },
        { key: 'store', label: 'Set Up Store Profile', done: data.store, link: 'seller-settings.html' },
        { key: 'products', label: 'Add Your First Product', done: data.products, link: 'seller-add-product.html' },
        { key: 'kyc', label: 'Verify Identity & Business', done: data.kyc, link: 'seller-kyc.html' },
        { key: 'payment', label: 'Connect Payment Method', done: data.payment, link: 'seller-settings.html' }
      ];
      const done = steps.filter(s => s.done).length;
      const pct = Math.round(done / steps.length * 100);

      $('#onboardingSteps').innerHTML = `
        <div class="card" style="text-align:center;margin-bottom:20px;padding:24px">
          <div style="font-size:2.5rem;margin-bottom:8px">${pct === 100 ? '🎉' : '📋'}</div>
          <h3 style="margin-bottom:4px">${pct === 100 ? 'All Set!' : done + ' of ' + steps.length + ' steps complete'}</h3>
          <div style="height:10px;background:var(--gray-400);border-radius:5px;overflow:hidden;margin:12px 0">
            <div style="height:100%;width:${pct}%;background:var(--success);border-radius:5px;transition:width .5s"></div>
          </div>
          <p style="font-size:.875rem;color:var(--gray-700)">${pct}% complete</p>
        </div>
        ${steps.map(s => `
          <div class="card" style="margin-bottom:8px;padding:16px;display:flex;align-items:center;gap:12px">
            <span style="font-size:1.5rem">${s.done ? '✅' : '⏳'}</span>
            <div style="flex:1"><strong style="font-size:.875rem">${s.label}</strong></div>
            ${s.done ? '<span class="badge badge-success">Done</span>' : '<a href="' + s.link + '" class="btn btn-primary btn-sm">Complete</a>'}
          </div>
        `).join('')}
        ${pct === 100 ? '<div class="card" style="text-align:center;margin-top:16px"><a href="seller-dashboard.html" class="btn btn-primary">Go to Dashboard</a></div>' : ''}
      `;
    }
    document.addEventListener('DOMContentLoaded', renderOnboarding);
  </script>
</body>
</html>

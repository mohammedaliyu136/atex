<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promotions - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-promotions.html">🏷️ <span>Promos</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <div style="max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="font-size:1.5rem">Store Promotions</h1>
        <p style="font-size:.875rem;opacity:.9">Create discounts and deals for your store.</p>
      </div>
      <button class="btn" style="background:#fff;color:var(--primary);font-weight:700" onclick="showAddPromo()">+ Create Promotion</button>
    </div>
  </div>

  <div class="container" style="max-width:720px">
    <div id="promoList"></div>

    <div id="addPromoForm" class="card" style="display:none;margin-top:16px">
      <h3 style="margin-bottom:16px">Create New Promotion</h3>
      <div class="form-group"><label>Promotion Name</label><input id="promoName" placeholder="e.g., Summer Sale"></div>
      <div class="form-row">
        <div class="form-group"><label>Type</label><select id="promoType"><option value="percent">Percentage Off</option><option value="flat">Flat Amount Off</option><option value="freeship">Free Shipping</option></select></div>
        <div class="form-group"><label>Value</label><input type="number" id="promoValue" placeholder="15" min="1"><p class="hint">% or $ amount depending on type</p></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Start Date</label><input type="date" id="promoStart"></div>
        <div class="form-group"><label>End Date</label><input type="date" id="promoEnd"></div>
      </div>
      <div class="form-group"><label>Apply to Products</label><select id="promoProducts" multiple style="height:100px">
        ${getSellerProducts().filter(p => p.status === 'active').map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
      </select><p class="hint">Hold Ctrl/Cmd to select multiple</p></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" onclick="savePromotion()">Create Promotion</button>
        <button class="btn btn-secondary" onclick="togglePromoForm()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getSellerPromos() {
      try { return JSON.parse(localStorage.getItem('sellerPromotions')) || SELLER_PROMOTIONS; } catch { return SELLER_PROMOTIONS; }
    }
    function setSellerPromos(p) { localStorage.setItem('sellerPromotions', JSON.stringify(p)); }

    function renderPromos() {
      const promos = getSellerPromos();
      const list = $('#promoList');

      if (promos.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">🏷️</div><h3>No promotions yet</h3><p>Create your first promotion to boost sales.</p></div>';
        return;
      }

      list.innerHTML = promos.map(p => {
        const statusColor = { active: 'badge-success', scheduled: 'badge-info', ended: 'badge-danger' };
        const typeLabel = { percent: p.value + '% Off', flat: '$' + p.value + ' Off', freeship: 'Free Shipping' };
        return `
        <div class="card" style="margin-bottom:12px;padding:20px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="font-weight:600">${p.name}</span>
                <span class="badge ${statusColor[p.status]}">${p.status}</span>
              </div>
              <p style="font-size:.875rem;color:var(--gray-900)">${typeLabel[p.type]} • ${formatDate(p.start)} → ${formatDate(p.end)}</p>
              <p style="font-size:.8125rem;color:var(--gray-900)">Products: ${p.products.join(', ')} • Used ${p.usage} times</p>
            </div>
            <div style="display:flex;gap:8px">
              ${p.status === 'active' ? '<button class="btn btn-sm" style="color:var(--danger)" onclick="endPromotion('+p.id+')">End</button>' : ''}
              <button class="btn btn-sm btn-secondary" onclick="showToast('Stats: ${p.usage} redemptions','')">📊 Stats</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function showAddPromo() { togglePromoForm(); }
    function togglePromoForm() {
      const f = $('#addPromoForm');
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function savePromotion() {
      const name = $('#promoName').value.trim();
      if (!name) { showToast('Enter promotion name', 'error'); return; }
      const selected = [...$('#promoProducts').selectedOptions].map(o => o.text);
      const promos = getSellerPromos();
      promos.push({
        id: Date.now(), name, type: $('#promoType').value,
        value: parseFloat($('#promoValue').value) || 0,
        products: selected, status: 'active',
        usage: 0, start: $('#promoStart').value || new Date().toISOString().split('T')[0],
        end: $('#promoEnd').value || '2026-12-31'
      });
      setSellerPromos(promos);
      renderPromos();
      togglePromoForm();
      showToast('Promotion created!', 'success');
    }

    function endPromotion(id) {
      const promos = getSellerPromos();
      const p = promos.find(x => x.id === id);
      if (p) { p.status = 'ended'; setSellerPromos(promos); renderPromos(); showToast('Promotion ended', ''); }
    }

    document.addEventListener('DOMContentLoaded', renderPromos);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:480px">
    <div class="card" style="margin-top:32px">
      <h1 style="font-size:1.5rem;margin-bottom:4px">Set Your Password</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Create a strong password for your account.</p>

      <form onsubmit="event.preventDefault(); location.href='profile.html'">
        <div class="form-group">
          <label>Create Password</label>
          <input type="password" placeholder="Min. 8 characters" minlength="8" required>
          <p class="hint">Must be at least 8 characters with a number and a letter.</p>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Re-enter password" required>
        </div>

        <div style="display:flex;gap:4px;margin-bottom:20px">
          <div style="flex:1;height:4px;border-radius:2px;background:var(--gray-400)"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--gray-400)"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--gray-400)"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--gray-400)"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Continue</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="orders.html">👤 <span>Account</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>My Wishlist</h1>
    <p>Items you've saved for later.</p>
  </div>

  <div class="container">
    <div class="product-grid" id="wishlistGrid"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderWishlist() {
      const grid = $('#wishlistGrid');
      const ids = getWishlist();
      const products = PRODUCTS.filter(p => ids.includes(p.id));

      if (products.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">♡</div><h3>Your wishlist is empty</h3><p>Save items you love for later.</p><a href="index.html" class="btn btn-primary">Browse Products</a></div>';
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-image">
            ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
            <button class="wishlist-btn active" data-id="${p.id}" onclick="toggleWishlist(${p.id}); renderWishlist()">♥</button>
            <a href="product.html?id=${p.id}">${p.image}</a>
          </div>
          <div class="product-body">
            <a href="product.html?id=${p.id}" class="product-title">${p.name}</a>
            <div class="product-category">${p.category}</div>
            <div class="product-rating">${starsHTML(p.rating)} ${p.rating}</div>
            <div class="product-price">
              <span class="price-current">$${p.price.toFixed(2)}</span>
              ${p.oldPrice ? `<span class="price-old">$${p.oldPrice.toFixed(2)}</span>` : ''}
            </div>
          </div>
          <div class="product-actions" style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" style="flex:1" onclick="addToCart(${p.id}); renderWishlist()">Add to Cart</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleWishlist(${p.id}); renderWishlist()">✕</button>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', renderWishlist);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Content - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="admin-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="admin-users.html">👥 <span>Users</span></a>
        <a href="admin-disputes.html">⚖️ <span>Disputes</span></a>
        <a href="admin-categories.html">📁 <span>Categories</span></a>
        <a href="admin-analytics.html">📈 <span>Analytics</span></a>
        <a href="admin-content.html">🎨 <span>Content</span></a>
        <span style="font-size:.75rem;padding:4px 8px;background:var(--danger);color:#fff;border-radius:4px;font-weight:600">ADMIN</span>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">Content Management</h1>
    <p style="font-size:.875rem;opacity:.9">Manage banners, promotions, and homepage content.</p>
  </div>

  <div class="container" style="max-width:640px">
    <div class="card" style="margin-bottom:16px">
      <h3 style="margin-bottom:16px">Homepage Banners</h3>
      <div id="bannerList"></div>
      <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="addBanner()">+ Add Banner</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">Featured Categories</h3>
      <div id="featuredCats"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getBanners() {
      try { return JSON.parse(localStorage.getItem('adminBanners')) || ADMIN_BANNERS; } catch { return ADMIN_BANNERS; }
    }
    function setBanners(b) { localStorage.setItem('adminBanners', JSON.stringify(b)); }

    function renderBanners() {
      const banners = getBanners();
      $('#bannerList').innerHTML = banners.map((b, i) => `
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--gray-200);border-radius:8px;margin-bottom:8px">
          <div style="width:100px;height:60px;background:${b.bg};border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.625rem;color:#fff;flex-shrink:0;text-align:center;padding:4px">${b.title}</div>
          <div style="flex:1"><strong style="font-size:.875rem">${b.title}</strong><br><span style="font-size:.75rem;color:var(--gray-700)">${b.subtitle}</span></div>
          <button class="btn btn-sm" style="background:transparent;color:var(--danger)" onclick="deleteBanner(${i})">🗑️</button>
        </div>
      `).join('');
    }

    function addBanner() {
      const banners = getBanners();
      banners.push({ title: 'New Banner', subtitle: 'Edit this banner', bg: 'linear-gradient(135deg,#6C5CE7,#E17055)', cta: 'Shop Now' });
      setBanners(banners);
      renderBanners();
      showToast('Banner added', 'success');
    }

    function deleteBanner(i) {
      if (!confirm('Delete this banner?')) return;
      const banners = getBanners().filter((_, idx) => idx !== i);
      setBanners(banners);
      renderBanners();
      showToast('Banner deleted', '');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderBanners();
      const cats = ['Electronics 📱', 'Fashion 👗', 'Home & Garden 🏡', 'Sports ⚽', 'Books 📚'];
      $('#featuredCats').innerHTML = cats.map(c => `<span class="badge badge-info" style="font-size:.875rem;padding:8px 12px;margin:4px;display:inline-block">${c}</span>`).join('');
    });
  </script>
</body>
</html>

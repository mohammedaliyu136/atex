<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Disputes - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="admin-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="admin-users.html">👥 <span>Users</span></a>
        <a href="admin-disputes.html">⚖️ <span>Disputes</span></a>
        <a href="admin-categories.html">📁 <span>Categories</span></a>
        <a href="admin-content.html">🎨 <span>Content</span></a>
        <span style="font-size:.75rem;padding:4px 8px;background:var(--danger);color:#fff;border-radius:4px;font-weight:600">ADMIN</span>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">Dispute Resolution</h1>
    <p style="font-size:.875rem;opacity:.9">Manage and resolve buyer-seller disputes.</p>
  </div>

  <div class="container">
    <div class="table-wrap card" style="padding:0">
      <table>
        <thead>
          <tr><th>ID</th><th>Order</th><th>Buyer</th><th>Seller</th><th>Issue</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="disputesTable"></tbody>
      </table>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function getDisputes() {
      try { return JSON.parse(localStorage.getItem('adminDisputes')) || ADMIN_DISPUTES; } catch { return ADMIN_DISPUTES; }
    }
    function setDisputes(d) { localStorage.setItem('adminDisputes', JSON.stringify(d)); }

    function renderDisputes() {
      const disputes = getDisputes();
      $('#disputesTable').innerHTML = disputes.map(d => `
        <tr>
          <td style="font-weight:600;font-size:.8125rem">${d.id}</td>
          <td>${d.order}</td>
          <td>${d.buyer}</td>
          <td>${d.seller}</td>
          <td style="max-width:200px;font-size:.875rem">${d.issue}</td>
          <td><span class="badge ${d.status === 'resolved' ? 'badge-success' : d.status === 'investigating' ? 'badge-warning' : 'badge-danger'}">${d.status}</span></td>
          <td>
            ${d.status === 'open' ? `<button class="btn btn-sm btn-primary" onclick="investigateDispute('${d.id}')">🔍 Investigate</button>` : ''}
            ${d.status !== 'resolved' ? `<button class="btn btn-sm" style="background:var(--success);color:#fff" onclick="resolveDispute('${d.id}')">✅ Resolve</button>` : '<span style="font-size:.8125rem;color:var(--gray-700)">Closed</span>'}
          </td>
        </tr>
      `).join('');
    }

    function investigateDispute(id) {
      const disputes = getDisputes();
      const d = disputes.find(x => x.id === id);
      if (d) { d.status = 'investigating'; setDisputes(disputes); renderDisputes(); showToast('Investigation started for ' + id, ''); }
    }

    function resolveDispute(id) {
      const disputes = getDisputes();
      const d = disputes.find(x => x.id === id);
      if (d) { d.status = 'resolved'; setDisputes(disputes); renderDisputes(); showToast('Dispute ' + id + ' resolved', 'success'); }
    }

    document.addEventListener('DOMContentLoaded', renderDisputes);
  </script>
</body>
</html>

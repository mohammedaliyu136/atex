<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
        <a href="index.html">🏪 <span>Buyer View</span></a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h1>Orders Received</h1>
      <div style="display:flex;gap:8px">
        <select id="orderFilter" onchange="renderSellerOrders()" style="width:auto">
          <option value="all">All Orders</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>

    <div id="sellerOrdersList"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderSellerOrders() {
      const orders = getSellerOrders();
      const filter = $('#orderFilter')?.value || 'all';
      const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);

      const list = $('#sellerOrdersList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>No orders found</h3><p>Orders from customers will appear here.</p></div>';
        return;
      }

      const statusColors = { pending: 'badge-warning', processing: 'badge-info', shipped: 'badge-primary', delivered: 'badge-success', cancelled: 'badge-danger' };
      const statusActions = ['pending', 'processing', 'shipped'];

      list.innerHTML = filtered.map(o => `
        <div class="card" style="margin-bottom:12px;padding:20px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="font-weight:600">${o.id}</span>
                <span class="badge ${statusColors[o.status]}">${o.status}</span>
                ${o.payment === 'Paid' ? '<span class="badge badge-success">Paid</span>' : '<span class="badge badge-danger">'+o.payment+'</span>'}
              </div>
              <p style="font-size:.8125rem;color:var(--gray-900)">${o.customer} • ${formatDate(o.date)}</p>
              <p style="font-size:.8125rem;color:var(--gray-900)">Ship to: ${o.shipping}</p>
            </div>
            <div style="text-align:right">
              <p style="font-weight:700;font-size:1.125rem;color:var(--primary)">$${o.total.toFixed(2)}</p>
            </div>
          </div>

          <div style="margin:12px 0;padding:12px;background:var(--gray-200);border-radius:var(--radius-sm);font-size:.875rem">
            ${o.items.map(item => `<div style="display:flex;justify-content:space-between"><span>${item.name} × ${item.qty}</span><span>$${(item.price * item.qty).toFixed(2)}</span></div>`).join('')}
          </div>

          ${statusActions.includes(o.status) ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--gray-400);padding-top:12px">
            ${o.status === 'pending' ? `<button class="btn btn-sm btn-primary" onclick="updateOrderStatus('${o.id}','processing')">✅ Accept Order</button>
              <button class="btn btn-sm" style="color:var(--danger)" onclick="updateOrderStatus('${o.id}','cancelled')">❌ Decline</button>` : ''}
            ${o.status === 'processing' ? `<button class="btn btn-sm btn-primary" onclick="updateOrderStatus('${o.id}','shipped')">📦 Mark Shipped</button>` : ''}
            ${o.status === 'shipped' ? `<button class="btn btn-sm btn-success" onclick="updateOrderStatus('${o.id}','delivered')">✅ Mark Delivered</button>` : ''}
            <button class="btn btn-sm btn-secondary" onclick="showToast('Order details sent to printer','success')">🖨️ Print Label</button>
            <button class="btn btn-sm btn-secondary" onclick="showToast('Contacting customer...','')">💬 Contact Buyer</button>
          </div>` : ''}
        </div>
      `).join('');
    }

    function updateOrderStatus(id, status) {
      sellerUpdateOrderStatus(id, status);
      renderSellerOrders();
      showToast('Order ' + id + ' updated to ' + status, 'success');
    }

    document.addEventListener('DOMContentLoaded', renderSellerOrders);
  </script>
</body>
</html>

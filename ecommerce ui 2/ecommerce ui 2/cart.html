<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="orders.html">👤 <span>Account</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:32px 24px">
    <h1>Shopping Cart</h1>
    <p>Review your items before checkout.</p>
  </div>

  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start" id="cartLayout">
      <div id="cartItems"></div>
      <div id="cartSummary"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const itemsEl = $('#cartItems');
      const summaryEl = $('#cartSummary');

      if (cart.length === 0) {
        itemsEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Looks like you haven\'t added anything yet.</p><a href="index.html" class="btn btn-primary">Start Shopping</a></div>';
        summaryEl.innerHTML = '';
        return;
      }

      itemsEl.innerHTML = '<div class="card" style="padding:0"><table><thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead><tbody id="cartTableBody"></tbody></table></div>';
      const tbody = $('#cartTableBody');
      let subtotal = 0;

      cart.forEach(item => {
        const p = PRODUCTS.find(x => x.id === item.id);
        if (!p) return;
        const total = p.price * item.qty;
        subtotal += total;
        tbody.innerHTML += `
          <tr>
            <td style="display:flex;align-items:center;gap:12px">
              <span style="font-size:2rem">${p.image}</span>
              <div>
                <a href="product.html?id=${p.id}" style="font-weight:600;font-size:.875rem">${p.name}</a>
                <p style="font-size:.75rem;color:var(--gray-900)">${p.category}</p>
              </div>
            </td>
            <td>$${p.price.toFixed(2)}</td>
            <td>
              <div style="display:flex;align-items:center;border:1px solid var(--gray-400);border-radius:6px;width:fit-content">
                <button class="btn btn-sm" style="padding:4px 10px;border:none" onclick="updateCartQty(${p.id}, ${item.qty - 1}); renderCart()">−</button>
                <span style="padding:4px 10px;font-weight:600;min-width:30px;text-align:center">${item.qty}</span>
                <button class="btn btn-sm" style="padding:4px 10px;border:none" onclick="updateCartQty(${p.id}, ${item.qty + 1}); renderCart()">+</button>
              </div>
            </td>
            <td style="font-weight:600">$${total.toFixed(2)}</td>
            <td><button class="btn btn-sm" style="color:var(--danger)" onclick="removeFromCart(${p.id}); renderCart()">✕</button></td>
          </tr>
        `;
      });

      const shipping = subtotal >= 50 ? 0 : 5.99;
      const tax = subtotal * 0.08;
      const total = subtotal + shipping + tax;

      summaryEl.innerHTML = `
        <div class="card">
          <h3 style="margin-bottom:16px">Order Summary</h3>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.875rem">
            <span>Subtotal</span><span>$${subtotal.toFixed(2)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.875rem">
            <span>Shipping</span><span>${shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:.875rem">
            <span>Tax (8%)</span><span>$${tax.toFixed(2)}</span>
          </div>
          <hr style="border:none;border-top:1px solid var(--gray-400);margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:24px;font-size:1.125rem;font-weight:700">
            <span>Total</span><span style="color:var(--primary)">$${total.toFixed(2)}</span>
          </div>
          <div class="form-group">
            <label>Have a coupon?</label>
            <div style="display:flex;gap:8px">
              <input placeholder="Enter code" id="cartCoupon" style="flex:1;text-transform:uppercase">
              <button class="btn btn-primary btn-sm" onclick="quickApplyCoupon()">Apply</button>
            </div>
            <p style="font-size:.75rem;color:var(--gray-900);margin-top:4px"><a href="promos.html" style="color:var(--primary)">Browse all coupons</a></p>
          </div>
          <button class="btn btn-primary btn-block btn-lg" onclick="location.href='checkout.html'">Proceed to Checkout</button>
          <a href="index.html" style="display:block;text-align:center;margin-top:12px;font-size:.875rem;color:var(--gray-900)">Continue Shopping</a>
        </div>
      `;
    }

    function quickApplyCoupon() {
      const code = $('#cartCoupon')?.value?.trim();
      if (!code) { showToast('Enter a coupon code', 'error'); return; }
      const result = applyCoupon(code);
      if (result.ok) {
        showToast(result.msg, 'success');
      } else {
        showToast(result.msg, 'error');
      }
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>

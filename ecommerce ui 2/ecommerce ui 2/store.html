<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store - ShopWave</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6C5CE7">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cookie-bar" id="cookieBar"><p>🍪 This site uses cookies.</p><button class="btn btn-primary btn-sm" onclick="acceptCookies()">Accept</button></div>
  <div style="position:fixed;bottom:80px;right:24px;z-index:500"><button id="darkModeToggle" class="btn btn-sm" style="background:var(--white);box-shadow:var(--shadow);border-radius:50%;width:48px;height:48px;font-size:1.25rem;padding:0">🌙</button></div>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
      </div>
    </div>
  </header>

  <div id="storeBanner" style="padding:48px 24px;text-align:center;color:#fff"></div>

  <div class="container">
    <div id="storeInfo" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px"></div>
    <h3 style="margin-bottom:16px">Products</h3>
    <div id="storeProducts" class="product-grid"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderStore() {
      const params = new URLSearchParams(location.search);
      const storeId = parseInt(params.get('id')) || 101;
      const seller = getSellerData();
      const products = getSellerProducts();

      const banner = $('#storeBanner');
      banner.style.background = seller.banner;
      banner.innerHTML = `<span style="font-size:4rem">${seller.logo}</span><h1 style="font-size:1.75rem;margin:8px 0">${seller.name}</h1><p style="opacity:.9;max-width:500px;margin:0 auto">${seller.description}</p>`;

      $('#storeInfo').innerHTML = `
        <div class="card" style="flex:1;text-align:center;padding:16px"><span style="font-size:.8125rem;color:var(--gray-700)">Rating</span><p style="font-size:1.25rem;font-weight:700">${'★'.repeat(Math.floor(seller.rating))} ${seller.rating}</p></div>
        <div class="card" style="flex:1;text-align:center;padding:16px"><span style="font-size:.8125rem;color:var(--gray-700)">Products</span><p style="font-size:1.25rem;font-weight:700">${seller.totalProducts}</p></div>
        <div class="card" style="flex:1;text-align:center;padding:16px"><span style="font-size:.8125rem;color:var(--gray-700)">Sales</span><p style="font-size:1.25rem;font-weight:700">${seller.totalSales}</p></div>
        <div class="card" style="flex:1;text-align:center;padding:16px"><span style="font-size:.8125rem;color:var(--gray-700)">Joined</span><p style="font-size:1.25rem;font-weight:700">${formatDate(seller.joined)}</p></div>
      `;

      const grid = $('#storeProducts');
      const active = products.filter(p => p.status === 'active');
      if (active.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>No products yet</h3></div>';
        return;
      }
      grid.innerHTML = active.map(p => `
        <div class="product-card">
          <div class="product-image" style="font-size:3rem">${p.image}</div>
          <div class="product-body">
            <div class="product-title">${p.name}</div>
            <div class="product-price"><span class="price-current">$${p.price.toFixed(2)}</span>${p.oldPrice ? `<span class="price-old">$${p.oldPrice.toFixed(2)}</span>` : ''}</div>
            <div style="font-size:.8125rem;color:var(--gray-700)">★ ${p.rating} | Sold: ${p.sold}</div>
          </div>
          <div class="product-actions"><button class="btn btn-primary btn-sm btn-block" onclick="showToast('${p.name} added to cart','success')">Add to Cart</button></div>
        </div>
      `).join('');
    }
    document.addEventListener('DOMContentLoaded', renderStore);
  </script>
</body>
</html>

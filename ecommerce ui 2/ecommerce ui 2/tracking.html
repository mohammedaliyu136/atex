<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="orders.html">👤 <span>Account</span></a>
      </div>
    </div>
  </header>

  <div class="container" style="max-width:720px" id="trackingPage"></div>

  <script src="js/app.js"></script>
  <script>
    function renderTracking() {
      const id = new URLSearchParams(location.search).get('id') || 'ORD-1002';
      const order = ORDERS.find(o => o.id === id);

      if (!order) {
        $('#trackingPage').innerHTML = '<div class="empty-state"><h3>Order not found</h3><a href="orders.html" class="btn btn-primary">View Orders</a></div>';
        return;
      }

      const timeline = {
        processing: [
          { time: formatDate(order.date) + ' 10:30 AM', title: 'Order Placed', desc: 'Your order has been confirmed.', done: true },
          { time: formatDate(order.date) + ' 2:15 PM', title: 'Payment Authorized', desc: 'Payment has been processed successfully.', done: true },
          { time: formatDate(new Date(new Date(order.date).getTime() + 86400000).toISOString()) + ' 9:00 AM', title: 'Order Processing', desc: 'Your items are being prepared.', done: order.status !== 'processing' },
          { time: formatDate(new Date(new Date(order.date).getTime() + 172800000).toISOString()) + ' 11:00 AM', title: 'Packaging Complete', desc: 'Your order has been packed.', done: order.status === 'shipped' || order.status === 'delivered' },
          { time: formatDate(new Date(new Date(order.date).getTime() + 259200000).toISOString()) + ' 3:00 PM', title: 'Shipped / Dispatched', desc: 'Your order is on the way!', done: order.status === 'shipped' || order.status === 'delivered' },
          { time: formatDate(new Date(new Date(order.date).getTime() + 432000000).toISOString()) + ' 6:00 PM', title: 'Out for Delivery', desc: 'Your package is with the delivery courier.', done: order.status === 'delivered' },
          { time: formatDate(new Date(new Date(order.date).getTime() + 518400000).toISOString()) + ' 2:30 PM', title: 'Delivered', desc: 'Package delivered successfully.', done: order.status === 'delivered' }
        ]
      };

      const items = timeline.processing;
      const lastDone = items.reduce((last, item, i) => item.done ? i : last, -1);

      $('#trackingPage').innerHTML = `
        <a href="orders.html" style="display:inline-flex;align-items:center;gap:4px;font-size:.875rem;color:var(--gray-900);margin-bottom:16px">&larr; Back to Orders</a>

        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
            <div>
              <h1 style="font-size:1.25rem">Order ${order.id}</h1>
              <p style="font-size:.875rem;color:var(--gray-900)">Placed on ${formatDate(order.date)}</p>
            </div>
            <div style="text-align:right">
              <span class="badge ${order.status === 'delivered' ? 'badge-success' : order.status === 'shipped' ? 'badge-info' : 'badge-warning'}" style="text-transform:capitalize;font-size:.875rem;padding:6px 16px">${order.status}</span>
            </div>
          </div>
        </div>

        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-size:.875rem">
            <div>
              <p style="font-weight:600;margin-bottom:4px">Tracking Number</p>
              <p style="color:var(--gray-900)">${order.tracking}</p>
            </div>
            <div>
              <p style="font-weight:600;margin-bottom:4px">Items</p>
              <p style="color:var(--gray-900)">${order.items} item${order.items > 1 ? 's' : ''}</p>
            </div>
            <div>
              <p style="font-weight:600;margin-bottom:4px">Total</p>
              <p style="font-weight:700;color:var(--primary)">$${order.total.toFixed(2)}</p>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom:20px">Tracking Timeline</h3>
          <div class="timeline">
            ${items.map((item, i) => `
              <div class="timeline-item ${item.done ? 'completed' : i === lastDone + 1 ? 'active' : ''}">
                <div class="time">${item.time}</div>
                <div class="title">${item.title}</div>
                <p style="font-size:.8125rem;color:var(--gray-900)">${item.desc}</p>
              </div>
            `).join('')}
          </div>
        </div>

        ${order.status !== 'delivered' ? `
        <div class="card" style="margin-top:16px;text-align:center">
          <p style="font-size:.875rem;color:var(--gray-900);margin-bottom:12px">Need help with this order?</p>
          <a href="support.html" class="btn btn-secondary">Contact Support</a>
        </div>` : `
        <div class="card" style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="location.href='reviews.html'">⭐ Rate Your Purchase</button>
          <button class="btn btn-secondary" onclick="showToast('Order reordered!','success')">🔄 Reorder</button>
          <button class="btn btn-secondary" onclick="location.href='returns.html'">↩️ Return Items</button>
        </div>`}
      `;

      document.title = 'Tracking ' + order.id + ' - ShopWave';
    }

    document.addEventListener('DOMContentLoaded', renderTracking);
  </script>
</body>
</html>

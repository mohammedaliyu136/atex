<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Products - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
        <a href="index.html">🏪 <span>Buyer View</span></a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <div>
        <h1>My Products</h1>
        <p style="color:var(--gray-900);font-size:.875rem" id="productCount">0 products</p>
      </div>
      <a href="seller-add-product.html" class="btn btn-primary">+ Add Product</a>
    </div>

    <div class="filter-bar">
      <select id="prodFilter" onchange="renderSellerProducts()">
        <option value="all">All Products</option>
        <option value="active">Active</option>
        <option value="draft">Drafts</option>
        <option value="outofstock">Out of Stock</option>
      </select>
      <input placeholder="Search products..." id="prodSearch" oninput="renderSellerProducts()" style="max-width:260px">
    </div>

    <div id="sellerProductsList"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderSellerProducts() {
      const products = getSellerProducts();
      const filter = $('#prodFilter')?.value || 'all';
      const search = ($('#prodSearch')?.value || '').toLowerCase();

      let filtered = products;
      if (filter !== 'all') filtered = filtered.filter(p => p.status === filter);
      if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));

      $('#productCount').textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');

      const list = $('#sellerProductsList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>No products found</h3><p>Add your first product to start selling.</p><a href="seller-add-product.html" class="btn btn-primary">Add Product</a></div>';
        return;
      }

      list.innerHTML = filtered.map(p => {
        const statusLabel = { active: 'Active', draft: 'Draft', outofstock: 'Out of Stock' };
        const statusClass = { active: 'badge-success', draft: 'badge-warning', outofstock: 'badge-danger' };
        return `
        <div class="card" style="margin-bottom:12px;padding:16px">
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <span style="font-size:2.5rem">${p.image}</span>
            <div style="flex:1;min-width:150px">
              <p style="font-weight:600">${p.name}</p>
              <p style="font-size:.8125rem;color:var(--gray-900)">${p.category} • SKU: SW-${String(p.id).slice(-4)}</p>
              <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
                <span class="badge ${statusClass[p.status]}">${statusLabel[p.status]}</span>
                <span style="font-size:.8125rem;color:var(--gray-900)">$${p.price.toFixed(2)}</span>
                <span style="font-size:.8125rem;color:var(--gray-900)">Stock: ${p.stock}</span>
                <span style="font-size:.8125rem;color:var(--gray-900)">Sold: ${p.sold}</span>
                ${p.rating ? `<span style="font-size:.8125rem;color:#F39C12">★ ${p.rating}</span>` : ''}
              </div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-sm btn-secondary" onclick="editProduct(${p.id})">✏️ Edit</button>
              <button class="btn btn-sm btn-secondary" onclick="duplicateProduct(${p.id})">📋 Copy</button>
              <button class="btn btn-sm" style="color:var(--danger)" onclick="deleteProduct(${p.id})">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function editProduct(id) {
      const p = getSellerProducts().find(x => x.id === id);
      if (p) location.href = 'seller-add-product.html?edit=' + id;
    }

    function duplicateProduct(id) {
      const products = getSellerProducts();
      const p = products.find(x => x.id === id);
      if (p) {
        const copy = { ...p, id: Date.now(), name: p.name + ' (Copy)', status: 'draft', sold: 0 };
        products.unshift(copy);
        setSellerProducts(products);
        renderSellerProducts();
        showToast('Product duplicated!', 'success');
      }
    }

    function deleteProduct(id) {
      if (confirm('Delete this product?')) {
        sellerDeleteProduct(id);
        renderSellerProducts();
        showToast('Product deleted', 'success');
      }
    }

    document.addEventListener('DOMContentLoaded', renderSellerProducts);
  </script>
</body>
</html>

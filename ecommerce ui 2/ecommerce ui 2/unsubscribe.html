<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribe - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width:480px;text-align:center;padding-top:80px">
    <div style="font-size:4rem;margin-bottom:16px">📧</div>
    <h1 style="margin-bottom:8px">Unsubscribe</h1>
    <p style="color:var(--gray-900);margin-bottom:24px">We're sorry to see you go. Confirm to stop receiving marketing emails.</p>
    <button class="btn btn-primary" onclick="unsubscribe()">Confirm Unsubscribe</button>
    <div id="unsubResult" style="margin-top:16px;font-size:.875rem"></div>
    <p style="margin-top:24px;font-size:.8125rem;color:var(--gray-700)"><a href="index.html" style="color:var(--primary)">Back to ShopWave</a></p>
  </div>
  <script src="js/app.js"></script>
  <script>
    function unsubscribe() {
      $('#unsubResult').innerHTML = '<span style="color:var(--success)">✅ You have been unsubscribed from marketing emails. You may still receive transactional emails related to your orders.</span>';
      showToast('Unsubscribed successfully', 'success');
    }
  </script>
</body>
</html>

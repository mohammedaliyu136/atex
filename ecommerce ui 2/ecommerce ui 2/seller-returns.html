<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Return Requests - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="seller-dashboard.html">📊 <span>Dashboard</span></a>
        <a href="seller-products.html">📦 <span>Products</span></a>
        <a href="seller-orders.html">📋 <span>Orders</span></a>
        <a href="seller-messages.html">💬 <span>Messages</span></a>
        <a href="seller-settings.html">⚙️ <span>Settings</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <h1 style="font-size:1.5rem">Return Requests</h1>
    <p style="font-size:.875rem;opacity:.9">Manage buyer return requests and refunds.</p>
  </div>

  <div class="container">
    <div id="sellerReturnsList"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const SELLER_RETURN_REQUESTS = [
      { id: 'RET-003', order: 'SORD-003', customer: 'Carol S.', product: 'Wireless Charger Pad', reason: 'Stopped working after 2 days', status: 'pending', date: '2026-06-19', amount: 29.99, condition: 'Defective' },
      { id: 'RET-004', order: 'SORD-001', customer: 'Alice M.', product: 'Bluetooth Earbuds Pro', reason: 'Changed mind - not needed', status: 'approved', date: '2026-06-17', amount: 79.99, condition: 'Unopened' },
      { id: 'RET-005', order: 'SORD-004', customer: 'David L.', product: 'Phone Stand Adjustable', reason: 'Wrong color delivered', status: 'received', date: '2026-06-15', amount: 59.97, condition: 'Used - like new' }
    ];

    function renderSellerReturns() {
      const list = $('#sellerReturnsList');
      if (SELLER_RETURN_REQUESTS.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">↩️</div><h3>No return requests</h3></div>';
        return;
      }

      list.innerHTML = SELLER_RETURN_REQUESTS.map(r => {
        const statusBadge = { pending: 'badge-warning', approved: 'badge-success', received: 'badge-info', rejected: 'badge-danger', refunded: 'badge-primary' };
        return `
        <div class="card" style="margin-bottom:12px;padding:20px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="font-weight:600">${r.id}</span>
                <span class="badge ${statusBadge[r.status]}">${r.status}</span>
              </div>
              <p style="font-size:.875rem;margin-bottom:2px"><strong>${r.product}</strong> — ${r.reason}</p>
              <p style="font-size:.8125rem;color:var(--gray-900)">Order ${r.order} • Customer: ${r.customer} • ${formatDate(r.date)}</p>
              <p style="font-size:.8125rem;color:var(--gray-900)">Condition: ${r.condition} • Amount: $${r.amount.toFixed(2)}</p>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${r.status === 'pending' ? `
                <button class="btn btn-sm btn-success" onclick="handleReturn('${r.id}','approved')">✅ Approve</button>
                <button class="btn btn-sm" style="color:var(--danger)" onclick="handleReturn('${r.id}','rejected')">❌ Reject</button>
              ` : ''}
              ${r.status === 'approved' ? `
                <button class="btn btn-sm btn-primary" onclick="handleReturn('${r.id}','received')">📦 Mark Received</button>
              ` : ''}
              ${r.status === 'received' ? `
                <button class="btn btn-sm btn-success" onclick="handleReturn('${r.id}','refunded'); showToast('Refund processed: $${r.amount.toFixed(2)}','success')">💵 Issue Refund</button>
              ` : ''}
              <button class="btn btn-sm btn-secondary" onclick="showToast('Contacting buyer...','')">💬 Message</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function handleReturn(id, status) {
      const r = SELLER_RETURN_REQUESTS.find(x => x.id === id);
      if (r) { r.status = status; renderSellerReturns(); showToast(`Return ${id} ${status}`, 'success'); }
    }

    document.addEventListener('DOMContentLoaded', renderSellerReturns);
  </script>
</body>
</html>

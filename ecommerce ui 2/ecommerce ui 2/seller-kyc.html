<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Verification - ShopWave Seller</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
    </div>
  </header>

  <div class="container" style="max-width:640px">
    <div class="steps" style="margin-top:16px">
      <div class="step completed"><div class="step-number">✓</div><div class="step-label">Account</div></div>
      <div class="step completed"><div class="step-number">✓</div><div class="step-label">Business</div></div>
      <div class="step active"><div class="step-number">3</div><div class="step-label">Verification</div></div>
      <div class="step"><div class="step-number">4</div><div class="step-label">Store</div></div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h1 style="font-size:1.5rem;margin-bottom:4px">Business Verification</h1>
      <p style="color:var(--gray-900);margin-bottom:24px;font-size:.875rem">Verify your identity and business to start selling.</p>

      <form onsubmit="event.preventDefault(); location.href='seller-dashboard.html'">
        <h3 style="margin-bottom:12px">Business Information</h3>
        <div class="form-group">
          <label>Business / Store Name</label>
          <input placeholder="Your Store Name" required>
        </div>
        <div class="form-group">
          <label>Business Type</label>
          <select>
            <option>Individual / Sole Proprietor</option>
            <option>LLC (Limited Liability Company)</option>
            <option>Corporation</option>
            <option>Partnership</option>
            <option>Non-Profit</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tax ID / EIN</label>
            <input placeholder="XX-XXXXXXX" required>
          </div>
          <div class="form-group">
            <label>Business License #</label>
            <input placeholder="Optional">
          </div>
        </div>
        <div class="form-group">
          <label>Business Address</label>
          <input placeholder="Street address" required>
        </div>
        <div class="form-row">
          <div class="form-group"><input placeholder="City" required></div>
          <div class="form-group"><input placeholder="State" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><input placeholder="ZIP Code" required></div>
          <div class="form-group"><select><option>United States</option><option>Canada</option><option>United Kingdom</option></select></div>
        </div>

        <hr style="border:none;border-top:1px solid var(--gray-400);margin:24px 0">

        <h3 style="margin-bottom:12px">Document Upload</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Government ID (Front)</label>
            <div class="upload-zone" onclick="document.getElementById('govIdFront').click()" style="padding:20px">
              <div class="upload-icon">🪪</div>
              <p>Upload front</p>
            </div>
            <input type="file" id="govIdFront" accept="image/*" style="display:none" onchange="handleUpload(this,'idFrontStatus')">
            <p id="idFrontStatus" class="hint"></p>
          </div>
          <div class="form-group">
            <label>Government ID (Back)</label>
            <div class="upload-zone" onclick="document.getElementById('govIdBack').click()" style="padding:20px">
              <div class="upload-icon">🪪</div>
              <p>Upload back</p>
            </div>
            <input type="file" id="govIdBack" accept="image/*" style="display:none" onchange="handleUpload(this,'idBackStatus')">
            <p id="idBackStatus" class="hint"></p>
          </div>
        </div>
        <div class="form-group">
          <label>Business License / Certificate</label>
          <div class="upload-zone" onclick="document.getElementById('busDoc').click()" style="padding:20px">
            <div class="upload-icon">📄</div>
            <p>Upload business document (PDF or image)</p>
          </div>
          <input type="file" id="busDoc" accept="image/*,application/pdf" style="display:none" onchange="handleUpload(this,'busDocStatus')">
          <p id="busDocStatus" class="hint"></p>
        </div>

        <hr style="border:none;border-top:1px solid var(--gray-400);margin:24px 0">

        <h3 style="margin-bottom:12px">Payout Information</h3>
        <div class="form-group">
          <label>Bank Account Holder Name</label>
          <input placeholder="Name on bank account" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Routing Number</label>
            <input placeholder="9-digit routing number" required>
          </div>
          <div class="form-group">
            <label>Account Number</label>
            <input placeholder="Account number" required>
          </div>
        </div>
        <div class="form-group">
          <label>Bank Name</label>
          <input placeholder="e.g., Chase, Bank of America" required>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select><option>Checking</option><option>Savings</option></select>
        </div>

        <hr style="border:none;border-top:1px solid var(--gray-400);margin:24px 0">

        <h3 style="margin-bottom:12px">Selfie Verification</h3>
        <div class="camera-container" style="margin-bottom:12px">
          <div class="placeholder" id="sellerSelfie">📷</div>
          <div class="camera-overlay"></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">
          <button type="button" class="btn btn-secondary btn-sm" onclick="captureSellerSelfie()">📸 Take Selfie</button>
        </div>

        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" required>
            <span style="font-size:.875rem">I confirm that all information provided is accurate and I agree to the <a href="terms.html" style="color:var(--primary)">Seller Agreement</a>.</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Submit & Go to Dashboard</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function handleUpload(input, id) {
      const el = $(`#${id}`);
      if (input.files?.[0]) { el.textContent = '✓ ' + input.files[0].name; showToast('File uploaded','success'); }
    }
    function captureSellerSelfie() {
      $('#sellerSelfie').textContent = '🧑';
      showToast('Selfie captured!','success');
    }
  </script>
</body>
</html>

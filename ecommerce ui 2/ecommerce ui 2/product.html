<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search products..." onkeydown="if(event.key==='Enter')location.href='search.html?q='+encodeURIComponent(this.value)">
      </div>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="orders.html">👤 <span>Account</span></a>
      </div>
    </div>
  </header>

  <div class="container" id="productDetail"></div>

  <script src="js/app.js"></script>
  <script>
    function renderProduct() {
      const id = parseInt(new URLSearchParams(location.search).get('id')) || 1;
      const p = PRODUCTS.find(x => x.id === id);
      if (!p) { $('#productDetail').innerHTML = '<div class="empty-state"><h3>Product not found</h3><a href="index.html" class="btn btn-primary">Back to Shop</a></div>'; return; }

      document.title = p.name + ' - ShopWave';

      $('#productDetail').innerHTML = `
        <a href="index.html" style="display:inline-flex;align-items:center;gap:4px;font-size:.875rem;color:var(--gray-900);margin-bottom:16px">&larr; Back to Products</a>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start">
          <div class="card" style="padding:48px;text-align:center;font-size:8rem;position:relative">
            ${p.badge ? `<span class="product-badge" style="font-size:.875rem;padding:6px 14px">${p.badge}</span>` : ''}
            ${p.image}
          </div>
          <div>
            <p style="font-size:.875rem;color:var(--gray-900);margin-bottom:4px">${p.category}</p>
            <h1 style="font-size:1.75rem;margin-bottom:8px">${p.name}</h1>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <span style="color:#F39C12;font-size:1.125rem">${starsHTML(p.rating)}</span>
              <span style="font-size:.875rem;color:var(--gray-900)">${p.rating} (${p.reviews} reviews)</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
              <span class="price-current" style="font-size:2rem">$${p.price.toFixed(2)}</span>
              ${p.oldPrice ? `<span class="price-old" style="font-size:1.25rem">$${p.oldPrice.toFixed(2)}</span><span class="badge badge-danger">Save ${Math.round((1-p.price/p.oldPrice)*100)}%</span>` : ''}
            </div>
            <p style="font-size:.875rem;color:var(--gray-900);margin-bottom:24px;line-height:1.8">Premium quality ${p.name.toLowerCase()} designed for comfort and durability. Features include ergonomic design, long-lasting battery life, and seamless connectivity. Perfect for everyday use.</p>

            ${p.colors ? `
            <div style="margin-bottom:20px">
              <p style="font-weight:600;font-size:.875rem;margin-bottom:8px">Color:</p>
              <div style="display:flex;gap:8px">
                ${p.colors.map(c => `<button style="width:32px;height:32px;border-radius:50%;background:${c};border:2px solid ${c === '#fff' ? 'var(--gray-400)' : 'transparent'};box-shadow:0 0 0 2px var(--white),0 0 0 3px var(--gray-400)" onclick="this.style.boxShadow='0 0 0 2px var(--white),0 0 0 3px var(--primary)'"></button>`).join('')}
              </div>
            </div>` : ''}

            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
              <div style="display:flex;align-items:center;border:1px solid var(--gray-400);border-radius:var(--radius-sm)">
                <button class="btn btn-sm" style="border:none;padding:10px 16px" onclick="updateQty(-1)">−</button>
                <span id="qtyDisplay" style="padding:10px 16px;font-weight:600;min-width:40px;text-align:center">1</span>
                <button class="btn btn-sm" style="border:none;padding:10px 16px" onclick="updateQty(1)">+</button>
              </div>
            </div>

            <div style="display:flex;gap:12px;flex-wrap:wrap">
              <button class="btn btn-primary btn-lg" style="flex:1;min-width:200px" onclick="addToCart(${p.id}, parseInt($('#qtyDisplay').textContent))">Add to Cart 🛒</button>
              <button class="btn btn-outline btn-lg" onclick="toggleWishlist(${p.id})">♡ Wishlist</button>
            </div>

            <div style="display:flex;gap:24px;margin-top:24px;padding:16px 0;border-top:1px solid var(--gray-400);font-size:.875rem;color:var(--gray-900)">
              <span>🚚 Free shipping</span>
              <span>🔄 30-day returns</span>
              <span>🔒 Secure checkout</span>
            </div>
          </div>
        </div>
      `;
    }

    let currentQty = 1;
    function updateQty(delta) {
      currentQty = Math.max(1, currentQty + delta);
      $('#qtyDisplay').textContent = currentQty;
    }

    document.addEventListener('DOMContentLoaded', renderProduct);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Shop<span>Wave</span></a>
      <div class="header-actions">
        <a href="become-seller.html">🏪 <span>Sell</span></a>
        <a href="wishlist.html">♡ <span>Wishlist</span></a>
        <a href="cart.html">🛒 <span>Cart</span> <span class="cart-count">0</span></a>
        <a href="notifications.html">🔔 <span>Alerts</span></a>
      </div>
    </div>
  </header>

  <div class="page-hero" style="padding:24px 24px">
    <div style="max-width:720px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="font-size:1.5rem">Notifications</h1>
        <p style="font-size:.875rem;opacity:.9" id="notifSummary">0 unread</p>
      </div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="markAllReadNotif(); renderNotif()">✅ Mark All Read</button>
    </div>
  </div>

  <div class="container" style="max-width:720px">
    <div class="tabs">
      <div class="tab active" onclick="switchNotifTab(this,'all')">All</div>
      <div class="tab" onclick="switchNotifTab(this,'unread')" id="unreadTab">Unread</div>
    </div>
    <div id="notifList"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderNotif(filter = 'all') {
      const all = getNotifications();
      const filtered = filter === 'unread' ? all.filter(n => !n.read) : all;
      const unread = getUnreadCount();

      $('#notifSummary').textContent = unread + ' unread';
      $('#unreadTab').textContent = 'Unread' + (unread > 0 ? ' (' + unread + ')' : '');

      const list = $('#notifList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><h3>No notifications</h3><p>You\'re all caught up!</p></div>';
        return;
      }

      list.innerHTML = filtered.map(n => `
        <div class="card" style="margin-bottom:8px;padding:16px;${!n.read ? 'border-left:4px solid var(--primary);background:var(--gray-100)' : ''}" onclick="markNotifRead(${n.id}); renderNotif('${filter}')">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <span style="font-size:1.5rem">${n.icon}</span>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <p style="font-weight:600;font-size:.875rem">${n.title}</p>
                <span style="font-size:.75rem;color:var(--gray-700);white-space:nowrap;margin-left:8px">${n.time}</span>
              </div>
              <p style="font-size:.8125rem;color:var(--gray-900);margin-top:2px">${n.message}</p>
            </div>
            ${!n.read ? '<span style="width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:6px"></span>' : ''}
          </div>
        </div>
      `).join('');
    }

    function markAllReadNotif() { markAllRead(); }
    function switchNotifTab(el, filter) {
      $$('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active');
      renderNotif(filter);
    }

    document.addEventListener('DOMContentLoaded', () => renderNotif('all'));
  </script>
</body>
</html>
